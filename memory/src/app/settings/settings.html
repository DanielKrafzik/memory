<div class="settings-container">
    <div class="settings-header">
        <h1>Settings</h1>
        <div>
            <div class="yellow-square"></div>
            <div class="yellow-line"></div>
        </div>
    </div>

    <div class="settings-content">
        <div class="setting-options">
            <div class="game-themes">
                <div class="theme-header">
                    <img src="/img/settings/palette.png" alt="">
                    <h2>Game themes</h2>
                </div>
                <div class="theme-options">
                    <div class="theme-option">
                        <img src="/img/settings/circle_choosen.png" alt="">
                        <p>
                            Code vibes theme
                        </p>
                    </div>
                    <div class="theme-option">
                        <img src="/img/settings/circle.png" alt="">
                        <p>
                            Gaming theme
                        </p>
                    </div>
                </div>
            </div>

            <div class="game-players">
                <div class="player-header">
                    <img src="/img/settings/chess_pawn.png" alt="">
                    <h2>Choose player</h2>
                </div>
                <div class="player-options">
                    <div class="player-option">
                        <img src="/img/settings/circle.png" alt="">
                        <p>
                            Blue
                        </p>
                    </div>
                    <div class="player-option">
                        <img src="/img/settings/circle.png" alt="">
                        <p>
                            Orange
                        </p>
                    </div>
                </div>
            </div>

            <div class="game-board">
                <div class="board-header">
                    <img src="/img/settings/style.png" alt="">
                    <h2>Boards size</h2>
                </div>
                <div class="board-options">
                    <div class="board-option">
                        <img src="/img/settings/circle.png" alt="">
                        <p>
                            16 cards
                        </p>
                    </div>
                    <div class="board-option">
                        <img src="/img/settings/circle.png" alt="">
                        <p>
                            24 cards
                        </p>
                    </div>
                    <div class="board-option">
                        <img src="/img/settings/circle.png" alt="">
                        <p>
                            32 cards
                        </p>
                    </div>
                </div>
            </div>
            
        </div>

        <div class="setting-visual">
            <img src="/img/settings/code_theme.png" alt="">
            <div>
                <p>Game theme</p>
                <img src="" alt="">
                <p>Player</p>
                <img src="" alt="">
                <p>Board size</p>
                <button>
                    <img src="" alt="">
                    <p>Start</p>
                </button>
            </div>
        </div>
    </div>
</div>
