<div class="gamescreen-container">
    <div class="game-bar">
        <div class="game-score">
            <img src="/img/gamescreen/Blue_label.png" alt="">
            <p>Blue {{blueScore}}</p>
            <img src="/img/gamescreen/Orange_label.png" alt="">
            <p>Orange {{orangeScore}}</p>
        </div>
        <div class="player-info">
            <p>Current player:</p>
            <img [src]="'/img/gamescreen/' + currentPlayer + '_label.png'" alt="">
        </div>
        <button class="exit-btn">
            <img src="/img/gamescreen/exit.png" alt="">
            <p>Exit game</p>
        </button>
    </div>

    <div class="board">

    <div
        *ngFor="let card of cards"
        class="card"
        (click)="flipCard(card)"
    >

        <div
        class="card__inner"
        [class.flipped]="card.flipped"
        >

        <img
            src="/img/gamescreen/code_back.png"
            alt=""
            class="card__face"
        >

        <img
            [src]="'/img/gamescreen/' + card.image"
            alt=""
            class="card__face card__face--back"
        >

        </div>

    </div>

    </div>
</div>
